<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 124 92"
     width="124mm" height="92mm"
     version="1.1">
  <defs>
    <style type="text/css"><![CDATA[
      .vtx     { fill: #111827; stroke: none; }
      .edge    { stroke: #4b5563; stroke-width: 0.55; stroke-linecap: round; fill: none; }
      .simplex { fill: #f59e0b; fill-opacity: 0.30; stroke: #b45309; stroke-width: 0.35; }
      .cell    { fill: #f59e0b; fill-opacity: 0.27; stroke: #b45309; stroke-width: 0.35; }
      .hyperV  { fill: #8b5cf6; fill-opacity: 0.24; stroke: #6d28d9; stroke-width: 0.40; stroke-dasharray: 0.9 0.6; }
      .hyperA  { fill: #f59e0b; fill-opacity: 0.24; stroke: #b45309; stroke-width: 0.40; stroke-dasharray: 0.9 0.6; }
      .hg      { fill: #0d9488; fill-opacity: 0.22; stroke: #0f766e; stroke-width: 0.40; stroke-dasharray: 0.9 0.6; }
      .lbl     { font-family: 'Helvetica', 'Arial', sans-serif; font-size: 2.9px; font-weight: 700; fill: #111827; }
    ]]></style>
    <!-- shared vertex set; included via <use> -->
    <g id="verts">
      <circle class="vtx" cx="6"  cy="6"  r="1.2"/>
      <circle class="vtx" cx="24" cy="5"  r="1.2"/>
      <circle class="vtx" cx="23" cy="15" r="1.2"/>
      <circle class="vtx" cx="17" cy="27" r="1.2"/>
      <circle class="vtx" cx="4"  cy="20" r="1.2"/>
    </g>
  </defs>

  <!-- ============ Row 1 ============ -->

  <!-- (a) Graph -->
  <g transform="translate(25, 14)">
    <text x="0" y="-3.5" class="lbl">(a) Graph</text>
    <path class="edge" d="M 6 6 L 24 5"/>
    <path class="edge" d="M 24 5 L 23 15"/>
    <path class="edge" d="M 23 15 L 17 27"/>
    <path class="edge" d="M 17 27 L 4 20"/>
    <path class="edge" d="M 4 20 L 6 6"/>
    <path class="edge" d="M 6 6 L 23 15"/>
    <use href="#verts"/>
  </g>

  <!-- (b) Hypergraph: only set-level hyperedges, no pairwise edges -->
  <g transform="translate(75, 14)">
    <text x="0" y="-3.5" class="lbl">(b) Hypergraph</text>
    <!-- 3-element hyperedge {v1, v2, v3} -->
    <ellipse class="hg" cx="17" cy="10" rx="16" ry="8"
             transform="rotate(15 17 10)"/>
    <!-- 3-element hyperedge {v3, v4, v5} -->
    <ellipse class="hg" cx="14" cy="22" rx="17" ry="8"
             transform="rotate(-18 14 22)"/>
    <use href="#verts"/>
  </g>

  <!-- ============ Row 2 ============ -->

  <!-- (c) Simplicial complex -->
  <g transform="translate(6, 56)">
    <text x="0" y="-3.5" class="lbl">(c) Simplicial complex</text>
    <polygon class="simplex" points="6,6 24,5 23,15"/>
    <path class="edge" d="M 6 6 L 24 5"/>
    <path class="edge" d="M 24 5 L 23 15"/>
    <path class="edge" d="M 23 15 L 17 27"/>
    <path class="edge" d="M 17 27 L 4 20"/>
    <path class="edge" d="M 4 20 L 6 6"/>
    <path class="edge" d="M 6 6 L 23 15"/>
    <use href="#verts"/>
  </g>

  <!-- (d) Cell complex -->
  <g transform="translate(47, 56)">
    <text x="0" y="-3.5" class="lbl">(d) Cell complex</text>
    <polygon class="cell" points="6,6 24,5 23,15 17,27 4,20"/>
    <path class="edge" d="M 6 6 L 24 5"/>
    <path class="edge" d="M 24 5 L 23 15"/>
    <path class="edge" d="M 23 15 L 17 27"/>
    <path class="edge" d="M 17 27 L 4 20"/>
    <path class="edge" d="M 4 20 L 6 6"/>
    <use href="#verts"/>
  </g>

  <!-- (e) Combinatorial complex -->
  <g transform="translate(88, 56)">
    <text x="-4" y="-3.5" class="lbl">(e) Combinatorial complex</text>
    <!-- rank-2 hyperedge (violet) {v1, v2, v3} -->
    <ellipse class="hyperV" cx="17" cy="10" rx="16" ry="8"
             transform="rotate(15 17 10)"/>
    <!-- rank-2 hyperedge (amber) {v3, v4, v5} -->
    <ellipse class="hyperA" cx="14" cy="22" rx="17" ry="8"
             transform="rotate(-18 14 22)"/>
    <path class="edge" d="M 6 6 L 24 5"/>
    <path class="edge" d="M 17 27 L 4 20"/>
    <path class="edge" d="M 4 20 L 6 6"/>
    <use href="#verts"/>
  </g>
</svg>
